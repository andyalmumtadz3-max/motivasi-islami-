<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Motivasi Islami</title>

    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: Arial;
            text-align: center;
        }
        /* FORM */
        
        #form {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        input {
            padding: 10px;
        }
        
        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }
        /* SLIDE */
        
        #slide {
            display: none;
            height: 100vh;
            cursor: pointer;
        }
        
        .nama {
            margin-top: 80px;
        }
        
        .arab {
            margin-top: 100px;
            font-size: 24px;
            color: gold;
        }
        
        .arti {
            margin-top: 20px;
            color: #ccc;
        }
    </style>
</head>

<body>

    <!-- FORM -->
    <div id="form">
        <h2>Masukkan Nama</h2>
        <input type="text" id="nama">
        <br>
        <button onclick="mulai()">Mulai</button>
    </div>

    <!-- SLIDE -->
    <div id="slide" onclick="nextSlide()">
        <div class="nama" id="namaUser"></div>
        <div class="arab" id="arab"></div>
        <div class="arti" id="arti"></div>
    </div>

    <!-- SCRIPT KAMU (TIDAK DIUBAH) -->
    <script>
        const data = [{
            arab: "لَا تَيْأَسْ مِنْ رَحْمَةِ اللَّهِ، فَإِنَّ اللَّهَ قَرِيبٌ مِنْكَ يَسْمَعُ دُعَاءَكَ",
            arti: "Jangan pernah berputus asa dari rahmat Allah, karena Dia dekat dan selalu mendengar doamu."
        }, {
            arab: "اصْبِرْ عَلَى مَا تَمُرُّ بِهِ، فَإِنَّ بَعْدَ كُلِّ صُعُوبَةٍ يُوجَدُ يُسْرٌ",
            arti: "Bersabarlah atas apa yang kamu lalui, karena setiap kesulitan pasti ada kemudahan."
        }, {
            arab: "لَا تَخَفْ مِنَ الْمُسْتَقْبَلِ، فَإِنَّ اللَّهَ قَدْ كَتَبَ لَكَ خَيْرًا",
            arti: "Jangan takut pada masa depan, karena Allah telah menuliskan yang terbaik untukmu."
        }];

        let index = 0;
        let typing = false;
        let namaUser = "";

        // MULAI
        function mulai() {
            let nama = document.getElementById("nama").value;

            if (nama === "") {
                alert("Masukkan nama dulu!");
                return;
            }

            namaUser = nama;

            document.getElementById("form").style.display = "none";
            document.getElementById("slide").style.display = "block";

            document.getElementById("namaUser").innerText = "Untuk " + nama;

            tampil();
        }

        // EFEK KETIK
        function ketik(teks, el, i = 0, callback) {
            typing = true;

            if (i < teks.length) {
                el.innerHTML += teks.charAt(i);
                setTimeout(() => ketik(teks, el, i + 1, callback), 40);
            } else {
                typing = false;
                if (callback) callback();
            }
        }

        // TAMPIL SLIDE
        function tampil() {
            let arab = document.getElementById("arab");
            let arti = document.getElementById("arti");

            arab.innerHTML = "";
            arti.innerHTML = "";

            ketik(data[index].arab, arab, 0, () => {
                setTimeout(() => {
                    arti.innerText = data[index].arti;
                }, 500);
            });
        }

        // ENDING
        function tampilEnding() {
            let arab = document.getElementById("arab");
            let arti = document.getElementById("arti");

            arab.innerHTML = "";
            arti.innerHTML = "";

            let pesan = `
يا ${namaUser}... لا تنسَ كم مرة سقطت ثم نهضت من جديد،
لا تنسَ كم من الصعوبات تجاوزتها بصبرك وإيمانك،
قد تتعب اليوم، وقد تشعر أنك وحدك،
لكن الله لم يتركك يومًا، ولن يتركك أبدًا،
فكن قويًا، واستمر، فإن في قلبك نورًا لا ينطفئ
`;

            let artiPesan = `
Untuk ${namaUser}...

Jangan lupakan berapa kali kamu jatuh, lalu bangkit kembali.
Jangan lupakan betapa banyak kesulitan yang sudah kamu lewati dengan sabar.

Mungkin hari ini kamu lelah,
mungkin kamu merasa sendirian...

Tapi Allah tidak pernah meninggalkanmu, dan tidak akan pernah.

Jadilah kuat,
teruslah berjalan...

Karena di dalam dirimu ada cahaya yang tidak akan pernah padam.
`;

            ketik(pesan, arab, 0, () => {
                setTimeout(() => {
                    arti.innerText = artiPesan;
                }, 800);
            });
        }

        // NEXT
        function nextSlide() {
            if (typing) return;

            index++;

            if (index < data.length) {
                tampil();
            } else {
                tampilEnding();
            }
        }
    </script>

</body>

</html>
